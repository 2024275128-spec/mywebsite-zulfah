		<form action="login.php" method="POST" onsubmit="return checkPassword()">
		<div class="mainbox">

						<tr><td>

						<h1 style="text-align: center; margin-top: 20px;">Sign-up</h1>

						<label><b>First Name:</b></label><br>

						<input type="text" name="lName" required><br>

						</label>

						<hr>

						<label><b>Address:</b></label><br>
						<input type="text" name="address" required><br>

						<label><b>Poscode:</b></label><br>
						<input type="text" name="poscode" required><br>

						<label><b>State:</b></label><br>

						<option>Terengganu</option>
						<option>Pahang</option>
						<option>Melaka</option>
						<option>Perak</option>
						<option>Selangor</option>

						<option>Sarawak</option>
						<option>Johor</option>
						<option>Langkawi</option>
						</select><br>

						<hr>

						<label><b>Phone Number:</b></label><br>
						<input type="text" name="phoneNum" required><br>

						<label><b>Email:</b></label><br>
						<input type="text" name="email" required>

						</td></tr>

							<label class="checkbox"><input type="checkbox" name="degree" required> Degree</label>

							<input type="text" name="username" required><br>

							<label><b>Password:</b></label><br>
							<input type="password" id="password" name="password" required><br>

							<label><b>Confirm Password</b></label><br>
							<input type="password" id="confirmPassword" name="confirmPassword" required><br>

							<script>
							function checkPassword() {
							  var pass = document.getElementById("password").value;
							  var confirmPass = document.getElementById("confirmPassword").value;

							  if (pass !== confirmPass) {
							    alert("Passwords do not match!");
							    return false;
							  }
							  return true;
							}
							</script>
