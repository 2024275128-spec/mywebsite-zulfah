<html>
	<head>
		<style>
			body{
            	text-align:center;
    			background: #f7f5f2;
    			margin: 0;
        	}
        	h1{
        		color: #000000;
        		padding-top: 30px;

        	}
        	footer {
			    text-align: center;
			    padding: 40px 0;
			    font-size: 13px;
			    color: var(--text-light);
			}

        	/*LOGO*/
        	.logo {
			    font-family: 'Times New Roman', serif;
			    font-size: 26px;
			    letter-spacing: 1px;
			}
			.logo a{
				transition: 0.3s;
				color: black;
				text-decoration: none;
			}
			.logo a:hover{

			}


			/*HEADER*/
			.top-header {
			    background: #f7f5f2;
			    color: black;
			    padding: 15px 30px;
			}

			.nav {
			    display: flex;
			    justify-content: space-between;
			    align-items: center;
			}
			.menu {
			    display: flex;
			}
			.menu a {
			    margin-left: 25px;
			    text-decoration: none;
			    color: black;
			    font-weight: bold;
			    font-size: 16px;
			    transition: 0.3s;
			}
			.menu a:hover {
			    color: #ffd700;
			}

			/*BOXES*/
			.mainbox {
        	   width: 1100px;
			   height: 2000px;
			   margin: 0 auto;
			   margin-top: 20px;
			   background: #000000;
			   border-radius: 10px;
			   box-shadow: 0 4px 10px rgba(0,0,0,0.2);
			   font-family: Times New Roman;
			   padding: 0px;
			   display: flex; 
			   justify-content: center;
			   align-items: center; 
        	}
        	.box {
	           width: 1090px;
			   height: 1990px;
			   margin: 0 auto;
			   background: #ffffff;
			   border-radius: 10px;
			   box-shadow: 0 4px 10px rgba(0,0,0,0.2);
			   font-family: Times New Roman;
			   text-align: center;
			   display: grid;
        	   grid-template-columns: 1fr 1fr 1fr;
        	   grid-template-rows: auto auto auto;
        	}
        	

        	/*PICTURES*/
        	.gambar{
        		width: 310px;
			    height: 210px;
			    background: #ffffff;
			    border-radius: 20px;
			    overflow: hidden;
			    transition: 0.3s;
			    cursor: pointer;
			    margin-left: 20px; 
			    margin-right: 20px; 
			    margin-top: 20px; 
			    margin-bottom: 20px;
			    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        	}
        	.gambar img {
			  width: 100%;
			  height: 100%;
			  object-fit: cover;
			  display: block;
			}
			.gambar:hover {
			    transform: translateY(-10px) scale(1.03);
			    box-shadow: 0 15px 30px rgba(0,0,0,0.3);
			}
			#lightbox {
			    display: none;
			    position: fixed;
			    z-index: 999;
			    top: 0;
			    left: 0;
			    width: 100%;
			    height: 100%;
			    background: rgba(0,0,0,0.9);
			    justify-content: center;
			    align-items: center;
			}

			#lightbox img {
			    max-width: 80%;
			    max-height: 80%;
			    border-radius: 10px;
			}

			/* CLOSE BUTTON */
			#lightbox .close {
			    position: absolute;
			    top: 20px;
			    right: 40px;
			    font-size: 40px;
			    color: white;
			    cursor: pointer;
			}

			/* NEXT / PREV BUTTONS */
			.prev, .next {
			    position: absolute;
			    top: 50%;
			    transform: translateY(-50%);
			    font-size: 50px;
			    color: white;
			    cursor: pointer;
			    padding: 10px;
			    user-select: none;
			}

			.prev { left: 30px; }
			.next { right: 30px; }

			.prev:hover, .next:hover {
			    color: #ffd700;
			}
        	
		</style>
	</head>

	<body>

		<script>
		let currentIndex = 0;
		let images = [];

		window.onload = function () {
		    images = document.querySelectorAll(".gambar img");

		    images.forEach((img, index) => {
		        img.onclick = () => openImage(index);
		    });
		};

		function openImage(index) {
		    currentIndex = index;
		    document.getElementById("lightbox").style.display = "flex";
		    document.getElementById("lightbox-img").src = images[index].src;
		}

		function closeImage() {
		    document.getElementById("lightbox").style.display = "none";
		}

		function changeImage(direction) {
		    currentIndex += direction;

		    if (currentIndex < 0) {
		        currentIndex = images.length - 1;
		    }

		    if (currentIndex >= images.length) {
		        currentIndex = 0;
		    }

		    document.getElementById("lightbox-img").src = images[currentIndex].src;
		}
		</script>
		<div id="lightbox">
		    <span class="close" onclick="closeImage()">&times;</span>
		    
		    <span class="prev" onclick="changeImage(-1)">&#10094;</span>
		    <img id="lightbox-img">
		    <span class="next" onclick="changeImage(1)">&#10095;</span>
		</div>
